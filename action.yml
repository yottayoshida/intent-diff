name: 'Intent Diff'
description: 'Compare PR description against git diff to detect mismatches. Outputs to GitHub Checks summary.'
branding:
  icon: 'git-pull-request'
  color: 'blue'

inputs:
  config-path:
    description: 'Path to .intent-diff.yml config file'
    required: false
    default: '.intent-diff.yml'
  version:
    description: 'intent-diff version to install (e.g. v0.1.3). Default: latest'
    required: false
    default: 'latest'
  claude-code-version:
    description: 'Claude Code CLI version to install'
    required: false
    default: '1'
  soft-fail:
    description: 'Exit 0 on analysis errors (default: true). Grade threshold failures always exit 1.'
    required: false
    default: 'true'

outputs:
  grade:
    description: 'Alignment grade (A-E)'
    value: ${{ steps.analyze.outputs.grade }}
  score:
    description: 'Alignment score (0-1)'
    value: ${{ steps.analyze.outputs.score }}
  has-mismatches:
    description: 'Whether mismatches were detected'
    value: ${{ steps.analyze.outputs.has-mismatches }}
  report-json:
    description: 'Path to JSON report file'
    value: ${{ steps.analyze.outputs.report-json }}

runs:
  using: 'composite'
  steps:
    - name: Install Claude Code CLI
      shell: bash
      env:
        CLAUDE_CODE_ACCEPT_TOS: '1'
      run: npm install -g @anthropic-ai/claude-code@${{ inputs.claude-code-version }}

    - name: Setup Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: 'go.mod'
        cache: false

    - name: Install intent-diff
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          go install github.com/yottayoshida/intent-diff/cmd/intent-diff@latest
        else
          go install github.com/yottayoshida/intent-diff/cmd/intent-diff@"$VERSION"
        fi

    - name: Collect PR metadata
      id: collect
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
        if [ "$PR_NUMBER" = "null" ] || [ -z "$PR_NUMBER" ]; then
          echo "::warning::Could not determine PR number from event payload. Skipping."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        gh pr view "$PR_NUMBER" --json title,body > /tmp/intent-diff-pr.json
        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: Analyze
      id: analyze
      if: steps.collect.outputs.skip != 'true'
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        CLAUDE_CODE_ACCEPT_TOS: '1'
      run: |
        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        REPORT_JSON="/tmp/intent-diff-report.json"

        intent-diff analyze \
          --pr-json /tmp/intent-diff-pr.json \
          --base "$BASE_SHA" --head "$HEAD_SHA" \
          --config "${{ inputs.config-path }}" \
          --json --out "$REPORT_JSON" \
          2>&1 || EXIT_CODE=$?

        if [ -f "$REPORT_JSON" ]; then
          GRADE=$(jq -r '.alignment.grade // empty' "$REPORT_JSON")
          SCORE=$(jq -r '.alignment.score // empty' "$REPORT_JSON")
          HAS_MISMATCHES=$(jq -r 'if (.mismatches | length) > 0 then "true" else "false" end' "$REPORT_JSON")

          echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "has-mismatches=$HAS_MISMATCHES" >> "$GITHUB_OUTPUT"
          echo "report-json=$REPORT_JSON" >> "$GITHUB_OUTPUT"
        fi

        exit "${EXIT_CODE:-0}"
